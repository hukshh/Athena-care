version: '3.8'

services:
  mongodb:
    image: mongo:6.0
    container_name: athenacare_mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-athenacare_secret}
      MONGO_INITDB_DATABASE: athenacare
    volumes:
      - mongodb_data:/data/db
    networks:
      - athenacare_network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: athenacare_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - MONGODB_URL=mongodb://${MONGO_USER:-admin}:${MONGO_PASSWORD:-athenacare_secret}@mongodb:27017/athenacare?authSource=admin
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET must be set}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - HUGGINGFACE_API_KEY=${HUGGINGFACE_API_KEY:-}
      - ENVIRONMENT=production
      - DEBUG=false
      - ALLOWED_ORIGINS=["https://athenacare.ai","http://localhost:3000"]
    volumes:
      - ./backend/uploads:/app/uploads
      - ./backend/models:/app/models
      - ./data:/app/data
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - athenacare_network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: athenacare_frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - athenacare_network

volumes:
  mongodb_data:

networks:
  athenacare_network:
    driver: bridge
